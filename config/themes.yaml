# テーマ設定ファイル
# 各テーマに対してニュースを収集し、AI要約・重要度スコアリングを行います

themes:
  - name: "AI時事ニュース"
    priority: 1
    max_articles: 10
    keywords:
      - "AI 人工知能 最新"
      - "生成AI ChatGPT Claude"
      - "機械学習 ディープラーニング"
    importance_criteria: |
      以下の観点で重要度を1-5で判定してください:

      高スコア(4-5):
      - 技術的ブレイクスルー（新しいモデル、アルゴリズムの発表）
      - 大手企業（OpenAI, Google, Anthropic, Microsoft等）の重要な発表
      - AI規制・法律関連の重要な動き
      - 業界全体に影響を与える可能性のあるニュース

      中スコア(3):
      - 興味深いが影響は限定的な技術ニュース
      - 特定業界でのAI活用事例
      - 研究論文の発表

      低スコア(1-2):
      - 一般的なAI関連ニュース
      - 既存技術の紹介記事
      - 個別企業の小規模な発表

  - name: "AIエージェント活用"
    priority: 2
    max_articles: 5
    keywords:
      - "AIエージェント 活用事例"
      - "AI自動化 業務効率化"
      - "LLM エージェント 実用"
    importance_criteria: |
      以下の観点で重要度を1-5で判定してください:

      高スコア(4-5):
      - 革新的なAIエージェントの活用事例
      - 大規模な業務自動化の成功事例
      - 新しいエージェントフレームワークやツールの発表

      中スコア(3):
      - 特定業界での活用事例
      - 中小規模の導入事例

      低スコア(1-2):
      - 一般的な活用方法の紹介
      - 概念的な説明記事

  - name: "データ×AI"
    priority: 3
    max_articles: 5
    keywords:
      - "データ分析 AI 活用"
      - "データ基盤 機械学習"
      - "ビッグデータ AI"
    importance_criteria: |
      以下の観点で重要度を1-5で判定してください:

      高スコア(4-5):
      - データ基盤とAIの革新的な統合事例
      - 大規模データ分析プラットフォームの発表
      - データエンジニアリングとMLOpsの重要なトレンド

      中スコア(3):
      - 特定業界でのデータ×AI活用事例
      - ツールやサービスのアップデート

      低スコア(1-2):
      - 基本的なデータ分析手法の紹介
      - 一般的なBI/分析ツールの紹介

  - name: "アソビュー関連"
    priority: 4
    max_articles: 5
    keywords:
      - "アソビュー株式会社"
      - "アソビュー asoview"
    importance_criteria: |
      以下の観点で重要度を1-5で判定してください:

      高スコア(4-5):
      - アソビューの重要なサービス発表やアップデート
      - 経営・事業に関する重要なニュース
      - 業界内での注目度が高いニュース

      中スコア(3):
      - 通常のプレスリリース
      - イベント・キャンペーン情報

      低スコア(1-2):
      - 一般的な紹介記事
      - 過去のニュースの再掲載
